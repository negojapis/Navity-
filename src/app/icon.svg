<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fundo escuro levemente arredondado -->
  <rect width="100" height="100" rx="20" fill="#111111" />
  
  <!-- Aro do relógio em dourado (Champagne Gold) -->
  <circle cx="50" cy="50" r="35" stroke="#C8A96A" stroke-width="6" fill="transparent" />
  
  <!-- Ponteiro das horas (menor) -->
  <line x1="50" y1="50" x2="65" y2="50" stroke="#C8A96A" stroke-width="6" stroke-linecap="round" />
  
  <!-- Ponteiro dos minutos (maior) -->
  <line x1="50" y1="50" x2="50" y2="25" stroke="#C8A96A" stroke-width="6" stroke-linecap="round" />
  
  <!-- Ponto central -->
  <circle cx="50" cy="50" r="6" fill="#C8A96A" />
</svg>
